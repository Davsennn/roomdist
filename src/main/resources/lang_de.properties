desc.pairwise=Die folgenden Bonusse und Abzüge werden paarweise (für jedes Paar von Personen in einem Zimmer) angewendet:
desc.preference=Der Bonus für Wunsch wird angewendet, wenn eine Person eine andere Person im Zimmer wünscht.
desc.nonPreference=Der Abzug für Nichtwunsch wird angewendet, wenn eine Person eine andere Person im Zimmer nicht wünscht.
desc.unfulfilledPreference=Der Abzug für unerfüllten Wunsch wird pro Wunsch einer Person angewendet, der nicht erfüllt wurde.
desc.mutualPreference=Der Bonus für gegenseitigen Wunsch wird angewendet, wenn zwei Personen im Zimmer sich gegenseitig wünschen.
desc.ageDiff=Der Abzug für Altersunterschied wird pro Jahr an Unterschied angewendet, wenn der Altersunterschied zweier Personen die Schwelle für Altersunterschied übersteigt.
desc.largeAgeDiff=Der Abzug für großen Altersunterschied wird pro Jahr an Unterschied angewendet, wenn der Altersunterschied zweier Personen die Schwelle für großen Altersunterschied übersteigt.
desc.sameLocation=Der Bonus für gleichen Ort wird angewendet, wenn zwei Personen im Zimmer im gleichen Ort sind.
desc.sameGender=Der Bonus für gleiches Geschlecht wird angewendet, wenn zwei Personen im Zimmer vom gleichen Geschlecht sind.

desc.roomwise=Die folgenden Bonusse und Abzüge werden zimmerweise (pro Zimmer berechnet) angewendet:
desc.largeGroup=Der Bonus für große Gruppen wird pro Person angewendet, wenn die Personenanzahl im Zimmer die Schwelle für große Gruppen übersteigt.
desc.underoccupancy=Der Abzug für freie Betten wird pro unbelegtem Bett im Zimmer angewendet (nach (Bettenanzahl - Personenanzahl) * Abzugswert)
desc.criticalOccupancy=Der Abzug für kritische Personenanzahl wird angewendet, wenn ein Zimmer ein Zustellbett für eine Person benötigt.

