desc.pairwise=The following bonuses and penalties are applied pairwise (for each pair of people in a room):
desc.preference=Preference Bonus is applied when a person is assigned a room with a person they prefer.
desc.nonPreference=Non Preference Penalty is applied when a person is assigned a room with a person they do not prefer.
desc.unfulfilledPreference=Unfulfilled Preference Penalty is applied when a person is assigned a room that lacks a person they prefer.
desc.mutualPreference=Mutual Preference Bonus is applied when two people in a room prefer each other.
desc.ageDiff=Age Difference Penalty is applied per-year when the age difference of two people in a room exceeds the Age Difference Threshold.
desc.largeAgeDiff=Large Age Difference Penalty is applied per-year when the age difference of two people in a room exceeds the Large Age Difference Threshold.
desc.sameLocation=Same Location Bonus is applied when two people in a room share the same location.
desc.sameGender=Same Gender Bonus is applied when two people in a room have the same gender.

desc.roomwise=The following bonuses and penalties are applied roomwise (calculated per room):
desc.largeGroup=Large Group Bonus is applied per-person when the occupants list of a room exceeds the Large Group Size Threshold and when the oldest person in the room is not older than the Large Group Age Limit.
desc.underoccupancy=Underoccupancy Penalty is applied per unoccupied bed in a room (by: (roomsize - groupsize) * underoccupancyPenalty)
desc.criticalOccupancy=Critical Occupancy Penalty is applied when a room needs an extra bed to serve its groupsize.

